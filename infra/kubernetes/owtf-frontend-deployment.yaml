apiVersion: apps/v1
kind: Deployment
metadata:
  name: owtf-frontend
  namespace: owtf
  labels:
    app: owtf-frontend
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: owtf-frontend
      component: frontend
  template:
    metadata:
      labels:
        app: owtf-frontend
        component: frontend
    spec:
      containers:
      - name: owtf-frontend
        image: owtf:frontend
        imagePullPolicy: Never
        command: ["nginx", "-g", "daemon off;"]
        ports:
        - name: http
          containerPort: 8019
          protocol: TCP
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        # livenessProbe:
        #   httpGet:
        #     path: /
        #     port: 8019
        #   initialDelaySeconds: 30
        #   periodSeconds: 30
        #   timeoutSeconds: 5
        #   failureThreshold: 3
        # readinessProbe:
        #   httpGet:
        #     path: /
        #     port: 8019
        #   initialDelaySeconds: 10
        #   periodSeconds: 10
        #   timeoutSeconds: 3
        #   failureThreshold: 3
      volumes:
      - name: nginx-config
        configMap:
          name: owtf-frontend-config
      restartPolicy: Always
